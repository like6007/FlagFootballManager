<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>Flag Football Live Stats</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.score{
    font-size:45px;
    font-weight:bold;
}

.panel{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

button{

    padding:10px 20px;
    margin:5px;
    font-size:18px;
    cursor:pointer;

}

.player{

    background:#eee;
    padding:10px;
    margin:5px;
    border-radius:6px;
    cursor:pointer;

}

.log{

    border-bottom:1px solid #ddd;
    padding:8px;

}

select{

    font-size:18px;

}

</style>

</head>

<body>

<h2 id="today"></h2>

<div class="header">

<div>

공격팀

<select id="offenseTeam"></select>

</div>

<div class="score">

<span id="homeScore">0</span>

:

<span id="awayScore">0</span>

</div>

<div>

수비팀

<select id="defenseTeam"></select>

</div>

</div>

<div class="panel">

현재 다운 :

<b id="down">1st Down</b>

<button onclick="nextDown()">다음 다운 ▶</button>

<button onclick="resetDown()">새로운 1st Down</button>

</div>

<div class="panel">

<button onclick="selectPlay('PASS')">

🏈 PASS

</button>

<button onclick="selectPlay('RUN')">

🏃 RUN

</button>

</div>

<div class="panel" id="playArea">

플레이를 선택하세요.

</div>

<div class="panel">

<h3>최근 플레이</h3>

<div id="playLog"></div>

</div>

<script>

const teams=[
"Thunders",
"Dynamites",
"Heroes",
"Mondays"
];

const players={

Thunders:["김민준","박준호","이도윤","정우성"],

Dynamites:["최민재","한지훈","유성민","이승우"],

Heroes:["박현우","이준","강민","최우혁"],

Mondays:["오민석","윤태","김준","박지훈"]

};

let currentDown=1;

let currentPlay="";

let selectedPlayer="";

let plays=[];

document.getElementById("today").innerHTML=
new Date().toLocaleDateString();

loadTeams();

function loadTeams(){

let offense=document.getElementById("offenseTeam");
let defense=document.getElementById("defenseTeam");

teams.forEach(team=>{

offense.innerHTML+=`<option>${team}</option>`;
defense.innerHTML+=`<option>${team}</option>`;

});

defense.selectedIndex=1;

}

function nextDown(){

if(currentDown<4){

currentDown++;

}

updateDown();

}

function resetDown(){

currentDown=1;

updateDown();

}

function updateDown(){

document.getElementById("down").innerHTML=

currentDown+"st Down";

}

function selectPlay(type){

currentPlay=type;

const team=document.getElementById("offenseTeam").value;

let html="<h3>"+type+"</h3>";

players[team].forEach(player=>{

html+=`

<div class='player'

onclick="playerSelected('${player}')">

${player}

</div>

`;

});

document.getElementById("playArea").innerHTML=html;

}

function playerSelected(player){

selectedPlayer=player;

savePlay();

}

function savePlay(){

const play={

down:currentDown,

offense:document.getElementById("offenseTeam").value,

defense:document.getElementById("defenseTeam").value,

type:currentPlay,

player:selectedPlayer,

time:new Date().toLocaleTimeString()

};

plays.unshift(play);

drawLog();

document.getElementById("playArea").innerHTML="플레이 저장 완료";

}

function drawLog(){

let html="";

plays.forEach((play,index)=>{

html+=`

<div class='log'>

<b>${play.down} Down</b>

|

${play.type}

|

${play.player}

</div>

`;

});

document.getElementById("playLog").innerHTML=html;

}

</script>

</body>

</html>
